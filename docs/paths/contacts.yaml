contacts:
  get:
    tags:
      - Contacts
    summary: Get all contacts
    operationId: getAllContacts
    description: Returns a paginated list of contacts belonging to the authenticated user
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        example: 1
      - name: perPage
        in: query
        schema:
          type: integer
          default: 10
        example: 10
      - name: sortBy
        in: query
        schema:
          type: string
          default: createdAt
        example: name
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: asc
      - name: isFavourite
        in: query
        schema:
          type: boolean
        example: true
      - name: contactType
        in: query
        schema:
          type: string
          enum: [work, home, personal]
        example: personal
    responses:
      '200':
        description: List of contacts
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  example: 200
                message:
                  type: string
                  example: Successfully found contacts!
                data:
                  type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../components/schemas/contact.yaml'
                    page:
                      type: integer
                      example: 1
                    perPage:
                      type: integer
                      example: 10
                    totalItems:
                      type: integer
                      example: 42
                    totalPages:
                      type: integer
                      example: 5
                    hasPreviousPage:
                      type: boolean
                      example: false
                    hasNextPage:
                      type: boolean
                      example: true
      '401':
        description: Unauthorized

  post:
    tags:
      - Contacts
    summary: Create a new contact
    operationId: createContact
    description: Creates a new contact for the authenticated user, optionally with a photo
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - name
              - phoneNumber
              - contactType
            properties:
              name:
                type: string
                example: John Doe
              phoneNumber:
                type: string
                example: '+1234567890'
              email:
                type: string
                example: john@example.com
              isFavourite:
                type: boolean
                example: false
              contactType:
                type: string
                enum: [work, home, personal]
                example: personal
              photo:
                type: string
                format: binary
    responses:
      '201':
        description: Contact created
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  example: 201
                message:
                  type: string
                  example: Successfully created a contact!
                data:
                  $ref: '../components/schemas/contact.yaml'
      '401':
        description: Unauthorized

contactById:
  get:
    tags:
      - Contacts
    summary: Get contact by ID
    operationId: getContactById
    description: Retrieves a single contact by its unique identifier
    security:
      - bearerAuth: []
    parameters:
      - name: contactId
        in: path
        required: true
        schema:
          type: string
        example: '65ca67e7ae7f10c88b598384'
    responses:
      '200':
        description: Contact found
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  example: 200
                message:
                  type: string
                  example: Successfully found contact!
                data:
                  $ref: '../components/schemas/contact.yaml'
      '401':
        description: Unauthorized
      '404':
        description: Contact not found

  patch:
    tags:
      - Contacts
    summary: Update contact
    operationId: updateContact
    description: Partially updates an existing contact by its ID
    security:
      - bearerAuth: []
    parameters:
      - name: contactId
        in: path
        required: true
        schema:
          type: string
        example: '65ca67e7ae7f10c88b598384'
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              name:
                type: string
                example: John Doe
              phoneNumber:
                type: string
                example: '+1234567890'
              email:
                type: string
                example: john@example.com
              isFavourite:
                type: boolean
                example: false
              contactType:
                type: string
                enum: [work, home, personal]
                example: personal
              photo:
                type: string
                format: binary
    responses:
      '200':
        description: Contact updated
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  example: 200
                message:
                  type: string
                  example: Successfully patched a contact!
                data:
                  $ref: '../components/schemas/contact.yaml'
      '401':
        description: Unauthorized
      '404':
        description: Contact not found

  delete:
    tags:
      - Contacts
    summary: Delete contact
    operationId: deleteContact
    description: Deletes a contact by its ID
    security:
      - bearerAuth: []
    parameters:
      - name: contactId
        in: path
        required: true
        schema:
          type: string
        example: '65ca67e7ae7f10c88b598384'
    responses:
      '204':
        description: Contact deleted
      '401':
        description: Unauthorized
      '404':
        description: Contact not found
