type: object
required:
  - name
  - phoneNumber
  - contactType
properties:
  _id:
    type: string
    example: '65ca67e7ae7f10c88b598384'
  name:
    type: string
    example: 'John Doe'
  phoneNumber:
    type: string
    example: '+1234567890'
  email:
    type: string
    example: 'john@example.com'
  isFavourite:
    type: boolean
    default: false
    example: false
  contactType:
    type: string
    enum: ['work', 'home', 'personal']
    default: personal
    example: personal
  userId:
    type: string
    example: '65ca67e7ae7f10c88b598385'
  photo:
    type: string
    nullable: true
    example: 'https://res.cloudinary.com/example/image.jpg'
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
